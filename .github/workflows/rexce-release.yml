name: rexce Release CI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run rexce contract validation
        env:
          SNAPSHOT_SIGNING_SECRET: ${{ secrets.SNAPSHOT_SIGNING_SECRET }}
        run: |
          python tests/validate_contract.py

      - name: Prepare bundle
        run: |
          mkdir -p dist
          tar -czf dist/rexce-contract-bundle.tar.gz             contract/rexce-contract.yml             contract/rexce-contract.json             contract/rexce-compliance.md             tests/validate_contract.py             .github/workflows/rexce-validation.yml

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rexce-contract-bundle
          path: dist/rexce-contract-bundle.tar.gz

      - name: Attach bundle to GitHub Release (if release)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" dist/rexce-contract-bundle.tar.gz --clobber

      - name: Create Release and attach (if tag push)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" -t "$TAG" -n "rexce contract bundle"
          gh release upload "$TAG" dist/rexce-contract-bundle.tar.gz --clobber

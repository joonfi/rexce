# File: rexce/xcectua-interface/templates/xcectua-circuit/.github/workflows/rer-governance-gate.yml
name: Validate Release Evidence (RER)

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: read

env:
  PDR_ROOT: pdr
  PDR_LOGS: pdr/logs
  PDR_INPUTS: pdr/inputs
  # Canonical rexec policy source path (policy-only; no evidence lives here)
  REXEC_POLICY_SRC: rexce/xcectua-interface/policies
  REXEC_INTERFACE_GATE: rexce/xcectua-interface/templates/xcectua-circuit/.github/workflows/rer-governance-gate.yml
  # Deterministic tool versions (pin for reproducibility)
  CONFTEST_VERSION: "0.52.0"
  OPA_VERSION: "0.66.0"
  COSIGN_INSTALLER: "sigstore/cosign-installer@v3.6.0"
  YQ_VERSION: "v4.43.1"

jobs:
  gate:
    name: Validate Release Evidence (RER)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare PDR directory (early, fail-closed posture)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${PDR_LOGS}" "${PDR_INPUTS}"
          cat > "${PDR_ROOT}/meta.json" << 'JSON'
          {
            "runner_os": "${{ runner.os }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "job": "${{ github.job }}",
            "workflow": "${{ github.workflow }}",
            "repo": "${{ github.repository }}",
            "sha": "${{ github.sha }}",
            "ref": "${{ github.ref }}",
            "actor": "${{ github.actor }}",
            "event_name": "${{ github.event_name }}"
          }
          JSON

      - name: Install yq (pinned)
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Read rer.lock.yml (rexec pin and policy paths)
        id: lock
        shell: bash
        run: |
          set -euo pipefail
          test -f rer/rer.lock.yml
          REXEC_REPO="$(yq -r '.rexec.repository' rer/rer.lock.yml)"
          REXEC_REF="$(yq -r '.rexec.ref' rer/rer.lock.yml)"
          POLICIES_PATH="$(yq -r '.policy_contract.policies_path' rer/rer.lock.yml)"
          SETTINGS_PATH="$(yq -r '.policy_contract.settings_path' rer/rer.lock.yml)"
          {
            echo "rexec_repository=${REXEC_REPO}"
            echo "rexec_ref=${REXEC_REF}"
            echo "policies_path=${POLICIES_PATH}"
            echo "settings_path=${SETTINGS_PATH}"
          } >> "$GITHUB_OUTPUT"

      - name: Fetch rexec at pinned ref (policy-only)
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.lock.outputs.rexec_repository }}
          ref: ${{ steps.lock.outputs.rexec_ref }}
          path: rer/fetched/rexec
          # If rexec is private, set a consumer secret REXEC_READ_TOKEN:
          token: ${{ secrets.REXEC_READ_TOKEN || github.token }}

      - name: Materialize policies into pinned consumer path
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${{ steps.lock.outputs.policies_path }}")"
          rm -rf "${{ steps.lock.outputs.policies_path }}"
          cp -R "rer/fetched/rexec/${REXEC_POLICY_SRC}" "${{ steps.lock.outputs.policies_path }}"
          test -f "${{ steps.lock.outputs.settings_path }}"

      - name: Compute policy/settings hashes (sorted → rer-policy-sha256.txt)
        shell: bash
        run: |
          set -euo pipefail
          POLICY_DIR="${{ steps.lock.outputs.policies_path }}"
          SETTINGS_FILE="${{ steps.lock.outputs.settings_path }}"
          tmp_list="$(mktemp)"
          find "${POLICY_DIR}" -type f -name '*.rego' | LC_ALL=C sort > "${tmp_list}"
          echo "${SETTINGS_FILE}" >> "${tmp_list}"
          LC_ALL=C sort -u "${tmp_list}" -o "${tmp_list}"
          : > "${PDR_ROOT}/rer-policy-sha256.txt"
          while IFS= read -r f; do
            sha="$(sha256sum "$f" | awk '{print $1}')"
            printf "%s  %s\n" "${sha}" "${f}" >> "${PDR_ROOT}/rer-policy-sha256.txt"
          done < "${tmp_list}"
          rm -f "${tmp_list}"

      - name: Discover evidence (releases/**/release-record.yml) → evidence-dirs.txt
        id: discover
        shell: bash
        run: |
          set -euo pipefail
          LC_ALL=C find releases -type f -name 'release-record.yml' 2>/dev/null \
            | awk -F'/release-record.yml' '{print $1}' \
            | LC_ALL=C sort -u > "${PDR_ROOT}/evidence-dirs.txt" || true
          ECOUNT="$(wc -l < "${PDR_ROOT}/evidence-dirs.txt" | awk '{print $1}')"
          echo "evidence_count=${ECOUNT}" >> "$GITHUB_OUTPUT"
          echo '{}' > "${PDR_ROOT}/result.json"
          # mark early failure if none
          if [ "${ECOUNT}" -eq 0 ]; then
            echo "failure=true" >> "$GITHUB_ENV"
            cat > "${PDR_ROOT}/summary.md" << 'MD'
            # RER Gate Result

            **FAILED** — No evidence discovered under `releases/**/release-record.yml`.
            MD
          fi

      - name: Install cosign (pinned)
        if: env.failure != 'true'
        uses: ${{ env.COSIGN_INSTALLER }}
        with:
          cosign-release: 'v2.2.4'

      - name: Install conftest (pinned)
        if: env.failure != 'true'
        shell: bash
        run: |
          set -euo pipefail
          tmpd="$(mktemp -d)"
          curl -sSL -o "${tmpd}/conftest.tgz" "https://github.com/open-policy-agent/conftest/releases/download/v${CONFTEST_VERSION}/conftest_Linux_x86_64.tar.gz"
          tar -xzf "${tmpd}/conftest.tgz" -C "${tmpd}"
          install "${tmpd}/conftest" /usr/local/bin/conftest
          rm -rf "${tmpd}"
          conftest --version

      - name: Install OPA (pinned) for optional policy checks
        if: env.failure != 'true'
        shell: bash
        run: |
          set -euo pipefail
          curl -sSL -o /usr/local/bin/opa "https://openpolicyagent.org/downloads/v${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x /usr/local/bin/opa
          opa version

      - name: Load required refs from policy settings (sorted → required-refs.txt)
        id: refs
        if: env.failure != 'true'
        shell: bash
        run: |
          set -euo pipefail
          SETTINGS_FILE="${{ steps.lock.outputs.settings_path }}"
          yq -r '.required_refs[]' "${SETTINGS_FILE}" | LC_ALL=C sort > "${PDR_ROOT}/required-refs.txt"
          RCNT="$(wc -l < "${PDR_ROOT}/required-refs.txt" | awk '{print $1}')"
          echo "required_refs_count=${RCNT}" >> "$GITHUB_OUTPUT"
        # even if reading fails, subsequent Decide step will fail

      - name: Prepare wrapper inputs (PDR capture)
        if: env.failure != 'true'
        shell: bash
        run: |
          set -euo pipefail
          cp "${PDR_ROOT}/evidence-dirs.txt" "${PDR_INPUTS}/evidence-dirs.txt"
          [ -f "${PDR_ROOT}/required-refs.txt" ] && cp "${PDR_ROOT}/required-refs.txt" "${PDR_INPUTS}/required-refs.txt" || true

      - name: cosign verify-blob for each required ref (deterministic order)
        if: env.failure != 'true'
        id: cosign
        shell: bash
        env:
          COSIGN_EXPERIMENTAL: "0"
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          : > "${PDR_LOGS}/cosign.log"
          failures=0
          if [ -f "${PDR_ROOT}/required-refs.txt" ]; then
            while IFS= read -r ref; do
              [ -z "$ref" ] && continue
              blob="$ref"; sig="${ref}.sig"; bun="${ref}.bundle"
              if [ ! -f "$blob" ] || [ ! -f "$sig" ] || [ ! -f "$bun" ]; then
                echo "::error::Missing blob/signature/bundle for $ref" | tee -a "${PDR_LOGS}/cosign.log"
                failures=$((failures+1))
                continue
              }
              echo "== Verify: $blob" | tee -a "${PDR_LOGS}/cosign.log"
              if ! cosign verify-blob --key env://COSIGN_PUBLIC_KEY --signature "$sig" --bundle "$bun" "$blob" >> "${PDR_LOGS}/cosign.log" 2>&1; then
                echo "::error::cosign verify-blob failed for $ref" | tee -a "${PDR_LOGS}/cosign.log"
                failures=$((failures+1))
              fi
            done < "${PDR_ROOT}/required-refs.txt"
          else
            echo "::error::No required-refs.txt; cannot verify signatures" | tee -a "${PDR_LOGS}/cosign.log"
            failures=$((failures+1))
          fi
          echo "failures=${failures}" >> "$GITHUB_OUTPUT"

      - name: Run conftest (release)
        if: env.failure != 'true'
        shell: bash
        run: |
          set -euo pipefail
          POLICY_DIR="${{ steps.lock.outputs.policies_path }}"
          xargs -a "${PDR_ROOT}/evidence-dirs.txt" -r conftest test --no-color --namespace release --policy "${POLICY_DIR}" \
            > "${PDR_LOGS}/release.log" 2>&1 || true

      - name: Run conftest (promotion)
        if: env.failure != 'true'
        shell: bash
        run: |
          set -euo pipefail
          POLICY_DIR="${{ steps.lock.outputs.policies_path }}"
          xargs -a "${PDR_ROOT}/evidence-dirs.txt" -r conftest test --no-color --namespace promotion --policy "${POLICY_DIR}" \
            > "${PDR_LOGS}/promotion.log" 2>&1 || true

      - name: Run conftest (consistency)
        if: env.failure != 'true'
        shell: bash
        run: |
          set -euo pipefail
          POLICY_DIR="${{ steps.lock.outputs.policies_path }}"
          xargs -a "${PDR_ROOT}/evidence-dirs.txt" -r conftest test --no-color --namespace consistency --policy "${POLICY_DIR}" \
            > "${PDR_LOGS}/consistency.log" 2>&1 || true

      - name: Decide and write result.json + summary.md (fail-closed)
        shell: bash
        run: |
          set -euo pipefail
          fail=0

          # Early failure?
          if [ "${failure:-false}" = "true" ]; then
            fail=1
          fi

          # cosign failures
          if [ -n "${{ steps.cosign.outputs.failures }}" ] && [ "${{ steps.cosign.outputs.failures }}" -ne 0 ]; then
            fail=1
          fi

          # conftest failures by grep
          for ns in release promotion consistency; do
            if [ -s "${PDR_LOGS}/${ns}.log" ] && grep -E 'FAIL|deny' -qi "${PDR_LOGS}/${ns}.log"; then
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            cat > "${PDR_ROOT}/result.json" << 'JSON'
            {"ok":false,"reason":"signature_or_policy_failure"}
            JSON
            if [ ! -f "${PDR_ROOT}/summary.md" ]; then
              cat > "${PDR_ROOT}/summary.md" << 'MD'
              # RER Gate Result

              **FAILED** — One or more of: missing evidence, cosign verification failures, or conftest policy violations.
              MD
            fi
            exit 1
          else
            cat > "${PDR_ROOT}/result.json" << 'JSON'
            {"ok":true}
            JSON
            cat > "${PDR_ROOT}/summary.md" << 'MD'
            # RER Gate Result

            **PASSED** — All signatures verified and policies satisfied.
            MD
          fi

      - name: Always upload PDR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdr
          path: pdr/
          if-no-files-found: error

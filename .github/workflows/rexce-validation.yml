#name: rexce/validate

on:
  workflow_call:
#  pull_request:
#  push:
#    branches:
#      - main

jobs:
  validate:
    name: rexce/validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rexce repository
        uses: actions/checkout@v4
        with:
          repository: Irradi-ato-rs/rexce
          ref: main

      - name: Run rexce contract validator
        run: python tests/validate_contract.py
      
      - name: Ensure contract files exist
        run: |
          test -f contract/rexce-contract.yml
          test -f contract/rexce-contract.json

      - name: Lint YAML & JSON (basic structural checks)
        run: |
          python - <<'PY'
          import sys, json
          from pathlib import Path
          # YAML check via Python minimal parse guard (defer heavy deps)
          # Here we only sanity-check presence; deep schema checks happen in downstream repos.
          j = json.loads(Path('contract/rexce-contract.json').read_text())
          assert 'apiVersion' in j and 'artifacts' in j, "Missing keys in rexce-contract.json"
          print("JSON OK")
          PY

      - name: Run validator harness (no artifacts mode)
        run: |
          # The validator script should exit 0 if artifacts are absent (it prints INFO)
          # This confirms the harness does not hard-require runtime CSVs
          python tests/validate_contract.py

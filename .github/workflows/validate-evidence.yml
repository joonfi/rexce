# File: .github/workflows/validate-evidence.yml
name: rexec policy-only guard (no evidence allowed)

on:
  pull_request:
    branches: [ "**" ]
  push:
    branches: [ "**" ]

permissions:
  contents: read

jobs:
  no-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fail if any releases/** present in repo
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files 'releases/**' | grep -q .; then
            echo "::error::rexec must not contain any evidence (releases/** present)"
            exit 1
          fi

      - name: Fail if PR modifies any releases/**
        if: ${{ github.event_name == 'pull_request' }}
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if git diff --name-only "$base" "$head" | grep -E '^releases/' -q; then
            echo "::error::rexec PR cannot add/modify releases/**"
            exit 1
          fi
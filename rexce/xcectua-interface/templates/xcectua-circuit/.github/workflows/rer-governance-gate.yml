name: Validate Release Evidence (RER)

on:
  pull_request:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

env:
  RER_LOCKFILE: rer/rer.lock.yml
  PDR_DIR: pdr

jobs:
  validate:
    name: Governance Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout consumer repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for base/head comparisons via git show (promotion append-only)

      - name: Prepare PDR directory
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${PDR_DIR}"
          mkdir -p "${PDR_DIR}/logs" "${PDR_DIR}/inputs"
          echo "PDR workspace initialized at ${PDR_DIR}"

      - name: Require COSIGN_PUBLIC_KEY
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ secrets.COSIGN_PUBLIC_KEY || '' }}" ]]; then
            echo "ERROR: COSIGN_PUBLIC_KEY secret is required"; exit 1
          fi

      - name: Install yq (YAML processor)
        uses: mikefarah/yq@v4.44.3

      - name: Read RER lockfile
        id: lock
        shell: bash
        run: |
          set -euo pipefail
          test -f "${RER_LOCKFILE}"
          RER_REPO="$(yq '.rer.repository' "${RER_LOCKFILE}")"
          RER_REF="$(yq '.rer.ref' "${RER_LOCKFILE}")"
          RER_FETCHED_PATH="$(yq '.rer.fetched_path' "${RER_LOCKFILE}")"
          POLICIES_PATH="$(yq '.policy_contract.policies_path' "${RER_LOCKFILE}")"
          SETTINGS_PATH="$(yq '.policy_contract.settings_path' "${RER_LOCKFILE}")"

          echo "RER_REPO=${RER_REPO}"                 | tee -a $GITHUB_OUTPUT
          echo "RER_REF=${RER_REF}"                   | tee -a $GITHUB_OUTPUT
          echo "RER_FETCHED_PATH=${RER_FETCHED_PATH}" | tee -a $GITHUB_OUTPUT
          echo "POLICIES_PATH=${POLICIES_PATH}"       | tee -a $GITHUB_OUTPUT
          echo "SETTINGS_PATH=${SETTINGS_PATH}"       | tee -a $GITHUB_OUTPUT

      - name: Fetch rexec at pinned ref
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.lock.outputs.RER_REPO }}
          ref: ${{ steps.lock.outputs.RER_REF }}
          path: ${{ steps.lock.outputs.RER_FETCHED_PATH }}

      - name: Install conftest
        shell: bash
        run: |
          set -euo pipefail
          CONTF_VER="0.53.0"
          curl -sSL -o /tmp/conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${CONTF_VER}/conftest_${CONTF_VER}_Linux_x86_64.tar.gz"
          tar -C /usr/local/bin -xzf /tmp/conftest.tar.gz conftest
          conftest --version

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.6.0

      - name: Compute policy/settings hashes (deterministic order)
        shell: bash
        run: |
          set -euo pipefail
          POL="${{ steps.lock.outputs.POLICIES_PATH }}"
          SET="${{ steps.lock.outputs.SETTINGS_PATH }}"

          mapfile -t REGO_FILES < <(find "${POL}" -type f -name '*.rego' | LC_ALL=C sort)
          if [[ ${#REGO_FILES[@]} -eq 0 ]]; then
            echo "ERROR: No .rego policy files found under ${POL}" >&2
            exit 1
          fi

          {
            sha256sum "${REGO_FILES[@]}"
            sha256sum "${SET}"
          } | tee "${PDR_DIR}/rer-policy-sha256.txt"

      - name: Collect evidence directories (must exist; deterministic order)
        id: evdirs
        shell: bash
        run: |
          set -euo pipefail
          # POLICY-CONFORMANT: release record is YAML
          mapfile -t RECORDS < <(find releases -type f -name "release-record.yml" 2>/dev/null | LC_ALL=C sort || true)
          if [[ ${#RECORDS[@]} -eq 0 ]]; then
            echo "ERROR: No evidence found (no releases/**/release-record.yml)"; exit 1
          fi

          mapfile -t DIRS < <(
            printf '%s\n' "${RECORDS[@]}" \
              | xargs -I{} dirname "{}" \
              | LC_ALL=C sort -u
          )

          : > "${PDR_DIR}/evidence-dirs.txt"
          for d in "${DIRS[@]}"; do
            echo "$d" | tee -a "${PDR_DIR}/evidence-dirs.txt"
          done

          echo "count=${#DIRS[@]}" | tee -a $GITHUB_OUTPUT

      - name: Extract required refs from rexec policy settings (deterministic order)
        id: reqrefs
        shell: bash
        run: |
          set -euo pipefail
          SETTINGS="${{ steps.lock.outputs.SETTINGS_PATH }}"
          yq -o=json '.' "${SETTINGS}" \
            | jq -r '.policy.signature.verify_refs.required[]' \
            | LC_ALL=C sort \
            | tee "${PDR_DIR}/required-refs.txt"

          if [[ ! -s "${PDR_DIR}/required-refs.txt" ]]; then
            echo "ERROR: No required refs defined at .policy.signature.verify_refs.required[]"; exit 1
          fi

      - name: Verify evidence signatures with cosign (fail-closed)
        shell: bash
        env:
          COSIGN_PUBLIC_KEY: ${{ secrets.COSIGN_PUBLIC_KEY }}
        run: |
          set -euo pipefail
          ok_all=1
          while IFS= read -r evdir; do
            echo "== Verifying refs in: $evdir ==" | tee -a "${PDR_DIR}/logs/cosign.log"
            while IFS= read -r ref; do
              blob="${evdir}/${ref}"
              sig="${blob}.sig"
              bundle="${blob}.bundle"
              if [[ ! -f "$blob" ]]; then
                echo "MISSING: $blob" | tee -a "${PDR_DIR}/logs/cosign.log"; ok_all=0; continue
              fi
              if [[ ! -f "$sig" ]]; then
                echo "MISSING: $sig" | tee -a "${PDR_DIR}/logs/cosign.log"; ok_all=0; continue
              fi
              if [[ ! -f "$bundle" ]]; then
                echo "MISSING: $bundle" | tee -a "${PDR_DIR}/logs/cosign.log"; ok_all=0; continue
              fi
              echo "Verifying ${blob} ..." | tee -a "${PDR_DIR}/logs/cosign.log"
              if ! cosign verify-blob --key <(echo "${COSIGN_PUBLIC_KEY}") --signature "${sig}" --bundle "${bundle}" "${blob}" 2>&1 | tee -a "${PDR_DIR}/logs/cosign.log"; then
                echo "COSIGN VERIFY FAILED for ${blob}" | tee -a "${PDR_DIR}/logs/cosign.log"
                ok_all=0
              fi
            done < "${PDR_DIR}/required-refs.txt"
          done < "${PDR_DIR}/evidence-dirs.txt"

          if [[ $ok_all -ne 1 ]]; then
            echo "Signature verification failures detected"; exit 1
          fi

      - name: Compute PR labels (meta.pr_labels)
        id: prlabels
        shell: bash
        run: |
          set -euo pipefail
          # Default empty array for push and workflow_dispatch
          echo '[]' > "${PDR_DIR}/pr-labels.json"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            jq -c '[.pull_request.labels[].name]' "$GITHUB_EVENT_PATH" > "${PDR_DIR}/pr-labels.json"
          fi
          cat "${PDR_DIR}/pr-labels.json" | tee -a "${PDR_DIR}/logs/meta.log"

      - name: Run conftest (release/promotion/consistency) with policy-shaped inputs
        shell: bash
        run: |
          set -euo pipefail
          POL="${{ steps.lock.outputs.POLICIES_PATH }}"
          SET="${{ steps.lock.outputs.SETTINGS_PATH }}"
          PR_LABELS_JSON="$(cat "${PDR_DIR}/pr-labels.json")"

          # Ensure base branch ref is available for PR comparisons (promotion append-only)
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}" || true
          fi

          while IFS= read -r evdir; do
            RR_YML="${evdir}/release-record.yml"
            PROMO_JSON="${evdir}/promotion-log.json"

            test -f "${RR_YML}" || { echo "ERROR: Missing ${RR_YML}"; exit 1; }
            test -f "${PROMO_JSON}" || { echo "ERROR: Missing ${PROMO_JSON} (required for promotion/consistency)"; exit 1; }

            RELEASE_DIR_NAME="$(basename "${evdir}")"
            RELEASE_DIR_PATH="${evdir}"

            release_in="${PDR_DIR}/inputs/$(echo "${evdir}" | tr '/ ' '__')__release.json"
            yq -o=json '.' "${RR_YML}" \
              | jq --argjson labels "${PR_LABELS_JSON}" '. + {meta:{pr_labels:$labels}}' \
              > "${release_in}"

            echo "Conftest: release (${evdir})" | tee -a "${PDR_DIR}/logs/release.log"
            if ! conftest test --no-color --all-namespaces -p "${POL}" -d "${SET}" -n release "${release_in}" 2>&1 | tee -a "${PDR_DIR}/logs/release.log"; then
              echo "Release policy failures for ${evdir}"; exit 1
            fi

            promotion_in="${PDR_DIR}/inputs/$(echo "${evdir}" | tr '/ ' '__')__promotion.json"
            head_obj="$(cat "${PROMO_JSON}")"

            base_obj="null"
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              if git show "origin/${{ github.base_ref }}:${PROMO_JSON}" >/dev/null 2>&1; then
                base_obj="$(git show "origin/${{ github.base_ref }}:${PROMO_JSON}")"
              fi
            fi

            jq -n --argjson base "${base_obj}" --argjson head "${head_obj}" '{base:$base, head:$head}' > "${promotion_in}"

            echo "Conftest: promotion (${evdir})" | tee -a "${PDR_DIR}/logs/promotion.log"
            if ! conftest test --no-color --all-namespaces -p "${POL}" -d "${SET}" -n promotion "${promotion_in}" 2>&1 | tee -a "${PDR_DIR}/logs/promotion.log"; then
              echo "Promotion policy failures for ${evdir}"; exit 1
            fi

            consistency_in="${PDR_DIR}/inputs/$(echo "${evdir}" | tr '/ ' '__')__consistency.json"
            rr_obj="$(yq -o=json '.' "${RR_YML}")"
            promo_obj="$(cat "${PROMO_JSON}")"

            jq -n \
              --argjson rr "${rr_obj}" \
              --argjson promo "${promo_obj}" \
              --argjson labels "${PR_LABELS_JSON}" \
              --arg dir_name "${RELEASE_DIR_NAME}" \
              --arg dir_path "${RELEASE_DIR_PATH}" \
              '{
                release_record: $rr,
                promotion_log: $promo,
                postdeploy: null,
                meta: {
                  release_dir_name: $dir_name,
                  release_dir_path: $dir_path,
                  pr_labels: $labels
                }
              }' > "${consistency_in}"

            echo "Conftest: consistency (${evdir})" | tee -a "${PDR_DIR}/logs/consistency.log"
            if ! conftest test --no-color --all-namespaces -p "${POL}" -d "${SET}" -n consistency "${consistency_in}" 2>&1 | tee -a "${PDR_DIR}/logs/consistency.log"; then
              echo "Consistency policy failures for ${evdir}"; exit 1
            fi
          done < "${PDR_DIR}/evidence-dirs.txt"

      - name: Write PDR meta & summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg sha "${{ github.sha }}" \
            --arg run_id "${{ github.run_id }}" \
            --arg run_attempt "${{ github.run_attempt }}" \
            --arg workflow "${{ github.workflow }}" \
            --arg rer_repo "${{ steps.lock.outputs.RER_REPO }}" \
            --arg rer_ref "${{ steps.lock.outputs.RER_REF }}" \
            --arg pol "${{ steps.lock.outputs.POLICIES_PATH }}" \
            --arg set "${{ steps.lock.outputs.SETTINGS_PATH }}" \
            '{
              consumer: { repository: $repo, sha: $sha },
              run: { id: $run_id, attempt: $run_attempt, workflow: $workflow },
              rexec: { repository: $rer_repo, ref: $rer_ref },
              policy_contract: { policies_path: $pol, settings_path: $set },
              timestamps: { generated_at: (now|todate) }
            }' > "${PDR_DIR}/meta.json"

          PASS_SUMMARY="All validations passed"
          if [[ "${{ job.status }}" != "success" ]]; then
            PASS_SUMMARY="One or more validations failed"
          fi

          {
            echo "# Policy Decision Record (PDR) Summary"
            echo ""
            echo "- Consumer repo: ${{ github.repository }}"
            echo "- Commit SHA: ${{ github.sha }}"
            echo "- Run ID / Attempt: ${{ github.run_id }} / ${{ github.run_attempt }}"
            echo "- Rexec: ${{ steps.lock.outputs.RER_REPO }} @ ${{ steps.lock.outputs.RER_REF }}"
            echo "- Policies path: ${{ steps.lock.outputs.POLICIES_PATH }}"
            echo "- Settings path: ${{ steps.lock.outputs.SETTINGS_PATH }}"
            echo ""
            echo "## Evidence directories"
            sed 's/^/- /' "${PDR_DIR}/evidence-dirs.txt"
            echo ""
            echo "## Required refs"
            sed 's/^/- /' "${PDR_DIR}/required-refs.txt"
            echo ""
            echo "## Result"
            echo "${PASS_SUMMARY}"
          } > "${PDR_DIR}/summary.md"

          jq -n --arg status "${{ job.status }}" '{status:$status}' > "${PDR_DIR}/result.json"

      - name: Upload PDR artifact (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pdr-${{ github.run_id }}
          path: pdr
          retention-days: 7

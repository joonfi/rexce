name: Release rexec (RER + Xcectua Interface Kit)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Tag Release (policy tests + kit invariants)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout rexec repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # PRE-FLIGHT: fail-closed tag context + strict SemVer
      # -----------------------------
      - name: Preflight (require strict tag vX.Y.Z)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${GITHUB_REF_NAME:-}" ]]; then
            echo "ERROR: GITHUB_REF_NAME is empty; expected a tag ref." >&2
            exit 1
          fi
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Tag '${TAG_NAME}' does not match required format 'vX.Y.Z'." >&2
            exit 1
          fi
          echo "OK: strict tag format validated: ${TAG_NAME}"

      # -----------------------------
      # INVARIANT: kit VERSION must equal tag version (canonical path in rexec)
      # -----------------------------
      - name: Verify Xcectua Interface kit version (tag == VERSION; fail-closed)
        shell: bash
        run: |
          set -euo pipefail

          # This workflow is expected to run on tag refs
          if [[ -z "${GITHUB_REF_NAME:-}" ]]; then
            echo "ERROR: GITHUB_REF_NAME is empty; expected a tag ref." >&2
            exit 1
          fi

          TAG_NAME="${GITHUB_REF_NAME}"

          # Enforce strict tag format vX.Y.Z
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Tag '${TAG_NAME}' does not match required format 'vX.Y.Z'." >&2
            exit 1
          fi

          TAG_VERSION="${TAG_NAME#v}"

          KIT_VERSION_FILE="rexce/xcectua-interface/VERSION"
          if [[ ! -f "${KIT_VERSION_FILE}" ]]; then
            echo "ERROR: Missing Xcectua Interface kit VERSION file at ${KIT_VERSION_FILE}." >&2
            exit 1
          fi

          # Read and normalize VERSION
          KIT_VERSION="$(head -n 1 "${KIT_VERSION_FILE}" | tr -d '\r' | xargs)"
          if [[ -z "${KIT_VERSION}" ]]; then
            echo "ERROR: Xcectua Interface kit VERSION is empty." >&2
            exit 1
          fi

          # Enforce strict X.Y.Z in VERSION
          if [[ ! "${KIT_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Xcectua Interface kit VERSION '${KIT_VERSION}' must be in format X.Y.Z." >&2
            exit 1
          fi

          echo "Tag version              : ${TAG_VERSION}"
          echo "Xcectua Interface kit ver: ${KIT_VERSION}"

          if [[ "${TAG_VERSION}" != "${KIT_VERSION}" ]]; then
            echo "ERROR: VERSION mismatch. Tag '${TAG_NAME}' must equal kit VERSION '${KIT_VERSION}'." >&2
            exit 1
          fi

          echo "OK: Tag '${TAG_NAME}' matches kit VERSION '${KIT_VERSION}'."

      # -----------------------------
      # POLICY TESTS: rexec remains policy-only; we only test rexec policies/fixtures
      # -----------------------------
      - name: Install conftest (pinned)
        shell: bash
        run: |
          set -euo pipefail
          CONTF_VER="0.53.0"
          curl -sSL -o /tmp/conftest.tar.gz "https://github.com/open-policy-agent/conftest/releases/download/v${CONTF_VER}/conftest_${CONTF_VER}_Linux_x86_64.tar.gz"
          sudo tar -C /usr/local/bin -xzf /tmp/conftest.tar.gz conftest
          conftest --version

      - name: Run rexec policy tests (fixtures)
        shell: bash
        run: |
          set -euo pipefail
          test -d "policies" || { echo "ERROR: missing policies/"; exit 1; }
          test -d "policies/tests" || { echo "ERROR: missing policies/tests/"; exit 1; }
          test -f "policies/policy-settings.yml" || { echo "ERROR: missing policies/policy-settings.yml"; exit 1; }

          # Conftest runs against test fixtures only (rexec stays policy-only)
          conftest test --no-color --all-namespaces \
            -p "policies" \
            -d "policies/policy-settings.yml" \
            "policies/tests"

      # -----------------------------
      # XCECTUA INTERFACE KIT INVARIANTS: ensure required kit files exist at release time
      # -----------------------------
      - name: Verify Xcectua Interface kit template invariants (fail-closed)
        shell: bash
        run: |
          set -euo pipefail

          # Required kit files
          test -f "rexce/xcectua-interface/VERSION" || { echo "ERROR: missing rexce/xcectua-interface/VERSION"; exit 1; }
          test -f "rexce/xcectua-interface/README.md" || { echo "ERROR: missing rexce/xcectua-interface/README.md"; exit 1; }
          test -f "rexce/xcectua-interface/PDR-SPEC.md" || { echo "ERROR: missing rexce/xcectua-interface/PDR-SPEC.md"; exit 1; }

          # Required template subtree
          test -f "rexce/xcectua-interface/templates/xcectua-circuit/rer/rer.lock.yml" || { echo "ERROR: missing template rer.lock.yml"; exit 1; }
          test -f "rexce/xcectua-interface/templates/xcectua-circuit/.github/CODEOWNERS" || { echo "ERROR: missing template CODEOWNERS"; exit 1; }
          test -f "rexce/xcectua-interface/templates/xcectua-circuit/.github/workflows/rer-governance-gate.yml" || { echo "ERROR: missing template rer-governance-gate.yml"; exit 1; }

          echo "OK: Xcectua Interface kit invariants present."

      # -----------------------------
      # RELEASE: create GitHub Release with adoption notes (deterministic body)
      # -----------------------------
      - name: Create GitHub Release (adoption notes)
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## rexec Release (RER) + Xcectua Interface Kit

            This release provides:
            - Authoritative OPA/Conftest policies and settings (policy-only repo)
            - Xcectua Interface kit templates to enforce RER in CI/CD

            ### Xcectua Interface Kit
            - Location: `rexce/xcectua-interface/templates/xcectua-circuit/`
            - Version: `rexce/xcectua-interface/VERSION` (must equal this tag without leading `v`)

            ### Required consumer pinning
            Consumers MUST pin rexec using a lockfile:
            - `rer/rer.lock.yml` → `rer.ref: ${{ github.ref_name }}`

            ### Required enforcement
            Consumers MUST require the status check:
            - `Validate Release Evidence (RER)`

            ### Notes
            - `rexec` remains policy-only. Evidence storage and validation execution occur in consumer repositories.
